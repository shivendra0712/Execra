apiVersion: v1
kind: Service
metadata:
  name: execra-api
  namespace: execra
  labels:
    app.kubernetes.io/name: execra-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: execra-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
